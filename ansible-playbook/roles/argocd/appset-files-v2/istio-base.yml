---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: istio-base
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://istio-release.storage.googleapis.com/charts
    chart: base
    targetRevision: 1.29.2
    
    helm:
      values: |
        global:
          hub: docker.io/istio
          tag: 1.29.2

        meshConfig:
          enableTracing: true

          defaultConfig:
            tracing:
              sampling: 100.0
              zipkin:
                address: jaeger-collector.istio-system.svc.cluster.local:9411

  destination:
    server: https://kubernetes.default.svc
    namespace: istio-system

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
