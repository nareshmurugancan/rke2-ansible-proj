---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: istio-system
spec:
  template:
    spec:
      containers:
        - name: grafana
          env:
            - name: GF_SERVER_ROOT_URL
              value: http://mylocallab.local/grafana
            - name: GF_SERVER_SERVE_FROM_SUB_PATH
              value: "true"